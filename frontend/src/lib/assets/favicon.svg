  <!-- Roof -->
  <polygon points="16,4 30,17 2,17" fill="white"/>
  <!-- House body -->
  <rect x="5" y="16" width="22" height="12" fill="white"/>
  <!-- Left window -->
  <rect x="7" y="18" width="4" height="4" rx="0.5" fill="#1d4ed8"/>
  <!-- Right window -->
  <rect x="21" y="18" width="4" height="4" rx="0.5" fill="#1d4ed8"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="8" rx="1" fill="#1d4ed8"/>
</svg>
